<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>探哆哆公司团队周计划</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">TDD Team Weekly</p>
          <h1>探哆哆公司团队周计划</h1>
        </div>
        <div class="actions">
          <span id="weekLabel" class="pill">本周</span>
          <button id="employeeLoginBtn" class="ghost">成员登录</button>
          <button id="changePasswordBtn" class="ghost hidden">修改密码</button>
          <button id="logoutBtn" class="ghost hidden">退出成员</button>
          <button id="leaderLoginBtn" class="ghost">Leader 登录</button>
          <button id="memberViewBtn" class="ghost hidden">返回成员端</button>
        </div>
      </header>

      <section id="memberView" class="view active">
        <section class="panel member-head">
          <div class="profile-row">
            <img id="avatarPreview" class="avatar" alt="头像" />
            <div>
              <span class="label">当前成员</span>
              <strong id="currentEmployee">未登录</strong>
              <p class="meta">成员账号由 Leader 创建。登录后可提交计划、完成任务和打卡。</p>
            </div>
          </div>
          <div class="score">
            <span>我的积分</span>
            <strong id="myPoints">0</strong>
          </div>
        </section>

        <section id="profilePanel" class="panel hidden">
          <div class="panel-title">
            <h2>我的页面设置</h2>
            <span>背景色和头像会保存到云端</span>
          </div>
          <div class="profile-settings">
            <label>
              <span>网页背景色</span>
              <input id="bgColorInput" type="color" value="#f6f7fb" />
            </label>
            <label>
              <span>上传头像</span>
              <input id="avatarInput" type="file" accept="image/*" />
            </label>
            <button id="saveProfile" class="primary">保存设置</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>我的本周计划</h2>
            <span id="completionText">0%</span>
          </div>
          <div class="progress"><span id="completionBar"></span></div>
          <div id="quoteBox" class="quote hidden"></div>
          <div id="myPlans" class="todo-list"></div>
          <div class="button-row">
            <button id="addPlanBtn">新增计划</button>
            <button id="editPlanBtn">修改计划</button>
            <button id="showPlanBtn">显示计划</button>
          </div>
          <div id="planEditor" class="editor hidden">
            <p class="hint">一行一个 Todo，回车继续写下一条。</p>
            <textarea id="todoInput">1. </textarea>
            <button id="submitTodos" class="primary">提交计划</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Leader 本周计划</h2>
          </div>
          <div id="leaderPlans" class="list"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Leader 专属任务</h2>
          </div>
          <div id="dedicatedTasks" class="list"></div>
        </section>
      </section>

      <section id="leaderView" class="view">
        <section class="grid">
          <section class="panel">
            <h2>发布全员计划</h2>
            <input id="leaderTitle" placeholder="计划标题" />
            <textarea id="leaderDetails" placeholder="计划内容"></textarea>
            <button id="publishPlan" class="primary">发布</button>
          </section>

          <section class="panel">
            <h2>新建成员账号</h2>
            <input id="newMemberName" placeholder="员工姓名备注" />
            <input id="newUsername" placeholder="初始账户名" />
            <input id="newPassword" placeholder="初始密码" />
            <button id="createAccount" class="primary">创建/重置账号</button>
          </section>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>成员账号</h2>
            <span>Leader 可查看初始/当前密码</span>
          </div>
          <div id="accountList" class="list"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>专属任务</h2>
            <span>给指定成员分配任务</span>
          </div>
          <div class="reward-row">
            <select id="taskMember"></select>
            <input id="taskTitle" placeholder="任务标题" />
            <input id="taskDetails" placeholder="任务说明" />
            <button id="assignTask" class="primary">分配</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>积分调整</h2>
            <span>可增加或减少成员积分</span>
          </div>
          <div class="reward-row">
            <select id="rewardMember"></select>
            <input id="rewardPoints" type="number" step="1" placeholder="积分，可填负数" />
            <input id="rewardReason" placeholder="调整原因" />
            <button id="giveReward" class="primary">调整</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>成员计划与全员进度</h2>
          </div>
          <div id="progressBoard" class="progress-board"></div>
        </section>
      </section>
    </main>

    <div id="employeeModal" class="modal hidden">
      <div class="modal-card">
        <h2>成员登录</h2>
        <input id="employeeUsername" placeholder="账户名" />
        <input id="employeePassword" type="password" placeholder="密码" />
        <div class="button-row">
          <button id="confirmEmployee" class="primary">登录</button>
          <button id="cancelEmployee">取消</button>
        </div>
      </div>
    </div>

    <div id="passwordModal" class="modal hidden">
      <div class="modal-card">
        <h2>修改密码</h2>
        <input id="oldPassword" type="password" placeholder="原密码" />
        <input id="newPasswordSelf" type="password" placeholder="新密码，至少 4 位" />
        <div class="button-row">
          <button id="confirmChangePassword" class="primary">保存</button>
          <button id="cancelChangePassword">取消</button>
        </div>
      </div>
    </div>

    <div id="loginModal" class="modal hidden">
      <div class="modal-card">
        <h2>Leader 登录</h2>
        <input id="leaderCode" type="password" placeholder="请输入 leader 密码" />
        <div class="button-row">
          <button id="confirmLogin" class="primary">进入</button>
          <button id="cancelLogin">取消</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
